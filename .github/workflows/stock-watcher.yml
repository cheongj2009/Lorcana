name: Stock Watcher

on:
  workflow_dispatch:
    inputs:
      test_notifications:
        description: "Send test ntfy notification instead of polling products"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [stock-watcher-poll]
  schedule:
    # Backup only (GitHub minimum is 5 min). Primary trigger is cron-job.org
    # every 3 minutes via workflow_dispatch.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

concurrency:
  group: stock-watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest state from main
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock watcher
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: https://ntfy.sh
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          ENABLE_DESKTOP_NOTIFICATION: "false"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test_notifications }}" = "true" ]; then
            python3 stock_watcher.py --test
          else
            python3 stock_watcher.py
          fi

      - name: Commit state updates
        if: github.event_name != 'workflow_dispatch' || inputs.test_notifications != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/current.json state/history/

          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          summary="$(python3 - <<'PY'
          import json
          from pathlib import Path

          state = json.loads(Path("state/current.json").read_text())
          parts = []
          for entry in state.values():
              name = entry.get("name", "product")
              short = name.split(":")[-1].strip() if ":" in name else name
              level = entry.get("stock_level") or (
                  "in" if entry.get("in_stock") else "out"
              )
              status = level
              parts.append(f"{short}={status}")
          print(", ".join(parts) if parts else "no products")
          PY
          )"

          git commit -m "chore(state): ${summary} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # At 3-minute cadence, queued runs can finish with a stale base commit.
          # Retry pull/rebase + push; on conflict, re-apply this run's polled state.
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}..."
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            git rebase --abort 2>/dev/null || true
            echo "Re-syncing and re-applying polled state..."
            cp state/current.json /tmp/stock-watcher-current.json
            cp -R state/history /tmp/stock-watcher-history
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/stock-watcher-current.json state/current.json
            mkdir -p state/history
            cp -R /tmp/stock-watcher-history/. state/history/
            git add state/current.json state/history/
            git commit -m "chore(state): ${summary} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            sleep "$((attempt * 2))"
          done

          echo "Push failed after 5 attempts."
          exit 1
