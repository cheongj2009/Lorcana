name: Stock Watcher

on:
  workflow_dispatch:
    inputs:
      test_notifications:
        description: "Send test ntfy notification instead of polling products"
        required: false
        default: false
        type: boolean
  schedule:
    # Every 5 minutes (GitHub minimum). Offset minutes avoid :00/:05 load spikes
    # where scheduled jobs are more likely to be dropped.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

concurrency:
  group: stock-watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock watcher
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: https://ntfy.sh
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          ENABLE_DESKTOP_NOTIFICATION: "false"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test_notifications }}" = "true" ]; then
            python3 stock_watcher.py --test
          else
            python3 stock_watcher.py
          fi

      - name: Commit state updates
        if: github.event_name != 'workflow_dispatch' || inputs.test_notifications != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/current.json state/history/

          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          summary="$(python3 - <<'PY'
          import json
          from pathlib import Path

          state = json.loads(Path("state/current.json").read_text())
          parts = []
          for entry in state.values():
              name = entry.get("name", "product")
              short = name.split(":")[-1].strip() if ":" in name else name
              status = "in" if entry.get("in_stock") else "out"
              parts.append(f"{short}={status}")
          print(", ".join(parts) if parts else "no products")
          PY
          )"

          git commit -m "chore(state): ${summary} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
